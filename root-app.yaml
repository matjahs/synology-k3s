apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/matjahs/synology-k3s.git"
    targetRevision: HEAD
    path: .
    directory:
      recurse: true
      # Discover every child Application manifest at any depth, but not this
      # root Application itself (it is applied manually during bootstrap).
      include: '**/*-app.yaml'
      exclude: '{root-app.yaml,apps/cyberchef/cyberchef-app.yaml,apps/observability/splunk-otel-collector-app.yaml}'
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
