apiVersion: batch/v1
kind: CronJob
metadata:
  name: gatus-nfs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus-nfs
spec:
  schedule: "*/5 * * * *"          # every 5 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 90
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: nfs-check
              image: alpine:3.20
              command: ["/bin/sh", "-c"]
              args:
                - "apk add --no-cache curl >/dev/null && exec /bin/sh /scripts/nfs-check.sh"
              env:
                - name: GATUS_URL
                  value: "http://gatus-svc.monitoring.svc.cluster.local"
              envFrom:
                - secretRef:
                    name: gatus-secrets          # provides TOK_NFS
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: nfs-share
                  mountPath: /nfs
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: scripts
              configMap:
                name: gatus-nfs-scripts
                defaultMode: 0755
            # DS723+ export on the storage network (VLAN50). The node must have
            # L3 reachability to 172.16.50.0/24 for this mount to succeed.
            - name: nfs-share
              nfs:
                server: "172.16.50.100"
                path: "/volume3/vcf"
                readOnly: false
