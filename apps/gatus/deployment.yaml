apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate            # single RWO volume — don't run two pods at once
  selector:
    matchLabels:
      app: gatus
  template:
    metadata:
      labels:
        app: gatus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gatus
          image: twinproduction/gatus:v5.34.0
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GATUS_CONFIG_PATH
              value: /config
          # Credentials + push tokens referenced as ${VAR} inside config.yaml
          envFrom:
            - secretRef:
                name: gatus-secrets
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW       # required for icmp:// (ping) checks; still non-root
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: gatus-config
        - name: data
          persistentVolumeClaim:
            claimName: gatus-data
