# ---------------------------------------------------------------------------
# Gatus configuration  —  https://gatus.io/docs
# Rendered into a ConfigMap by kustomize. Secrets are injected as env vars
# from the `gatus-secrets` Secret and referenced here as ${VAR}.
#
# Endpoint set mirrors the live lab dashboard. FQDNs/IPs sourced from Infoblox
# IPAM (zone site-a.vcf.lab).
# ---------------------------------------------------------------------------

storage:
  type: sqlite
  path: /data/data.db

ui:
  title: "VCF Lab Status"
  header: "mxe11 Home Lab"

# Notifications (optional). Uncomment + add `alerts:` to any endpoint.
# alerting:
#   slack:
#     webhook-url: "${SLACK_WEBHOOK}"

endpoints:
  # ----------------------- GROUP: VCF - Management ------------------
  - name: vCenter
    group: VCF - Management
    url: "https://vc-mgmt-a.site-a.vcf.lab/ui/"          # 10.1.1.10
    interval: 60s
    client:
      insecure: true          # internal CA (VMCA/AD CS) not in Gatus trust store
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"
      - "[RESPONSE_TIME] < 2000"

  - name: vCenter - Admin
    group: VCF - Management
    url: "icmp://vc-mgmt-a.site-a.vcf.lab:5480"        # VAMI appliance mgmt
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"

  - name: NSX Manager
    group: VCF - Management
    url: "https://nsx-mgmt-01a.site-a.vcf.lab/login.jsp"   # 10.1.1.20 (VIP; nodes .21-.23)
    interval: 60s
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"

  # NSX cluster health — deep check via native Basic auth (NSX_AUTH = base64 user:pass)
  - name: NSX Manager - Cluster Status
    group: VCF - Management
    url: "https://nsx-mgmt-a.site-a.vcf.lab/api/v1/cluster/status"
    interval: 2m
    client:
      insecure: true
    headers:
      Authorization: "Basic ${NSX_AUTH}"
    conditions:
      - "[STATUS] == 200"
      - "[BODY].detailed_cluster_status.overall_status == STABLE"
      - "[BODY].mgmt_cluster_status.status == STABLE"
      - "[BODY].control_cluster_status.status == STABLE"

  - name: Supervisor Kubernetes API
    group: VCF - Management
    url: https://supervisor-mgmt-a.site-a.vcf.lab:6443/healthz
    interval: 60s
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status != Failure"
      - "[BODY].code != 401"

  - name: VCF Identity Manager
    group: VCF - Management
    url: "icmp://vidm-a.site-a.vcf.lab"
    interval: 60s
    client:
      insecure: true
    conditions:
      - "[CONNECTED] == true"

  # ----------------------- GROUP: VCF - Compute (ESXi) -------------
  - name: ESX 01
    group: VCF - Compute
    url: "https://esx-01a.site-a.vcf.lab/ui/"            # 10.1.1.101
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"

  - name: ESX 02
    group: VCF - Compute
    url: "https://esx-02a.site-a.vcf.lab/ui/"            # 10.1.1.102
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"

  # ----------------------- GROUP: VCF - Operations & Automation ----
  - name: VCF Operations
    group: VCF - Operations
    url: "https://ops-a.site-a.vcf.lab/ui/"              # 10.1.1.30
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"

  - name: VCF Operations - Admin
    group: VCF - Operations
    url: "https://ops-a.site-a.vcf.lab/admin/"            # VAMI appliance mgmt
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"

  - name: VCF Operations for Networks
    group: VCF - Operations
    url: "https://opsnet-01a.site-a.vcf.lab/"              # 10.1.1.60
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"

  - name: VCF Automation
    group: VCF - Operations
    url: "https://auto-a.site-a.vcf.lab/"               # 10.1.1.70
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"

  - name: VCF Automation Platform
    group: VCF - Operations
    url: "icmp://auto-platform-a.site-a.vcf.lab/"               # 10.1.1.70
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"

  # ----------------------- GROUP: Networking -----------------------
  - name: Avi Load Balancer
    group: Networking
    url: "https://alb-a.site-a.vcf.lab/"                 # 10.1.1.90
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"

  - name: Holo-Router - resolve google.com
    group: Networking
    url: "10.1.1.1"                                      # router-a / dns.site-a
    interval: 60s
    dns:
      query-name: "google.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  # ----------------------- GROUP: Infrastructure -------------------
  - name: Infoblox
    group: Infrastructure
    url: "https://infoblox.lab.mxe11.nl/"
    interval: 2m
    conditions:
      - "[STATUS] == 200"

  - name: Keycloak
    group: Infrastructure
    url: "https://keycloak.lab.mxe11.nl/"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 240h"

  # ----------------------- GROUP: Storage --------------------------
  # Reachability of the NFS service on the DS723+ storage network (VLAN50).
  - name: NFS Service (DS723+)
    group: Storage
    url: "tcp://172.16.50.100:2049"                      # /volume3/vcf export
    interval: 60s
    conditions:
      - "[CONNECTED] == true"

  # Dell PowerEdge T550 — physical host's iDRAC (out-of-band mgmt).
  # icmp:// works because the Deployment grants the NET_RAW capability.
  - name: Dell PowerEdge T550 (iDRAC)
    group: Infrastructure
    url: "icmp://idrac.lab.mxe11.nl"                     # 172.16.30.10
    interval: 2m
    conditions:
      - "[CONNECTED] == true"

  # The physical hypervisor that runs the whole nested VCF lab.
  - name: Physical ESX Host
    group: Infrastructure
    url: "https://esx.lab.mxe11.nl/ui/"                  # 172.16.30.11
    interval: 2m
    client:
      insecure: true
    conditions:
      - "[STATUS] == 200"

# =====================================================================
#  VCF LAB  —  push-based DEEP health (populated by the gatus-vcf CronJob).
#  Tokens expire, so Gatus can't poll these directly. Tokens come from the
#  gatus-secrets Secret and must match what the CronJob script sends.
# =====================================================================
external-endpoints:
  - name: vcenter-appliance-health
    group: VCF - Deep Health
    token: "${TOK_VCENTER}"
    heartbeat:
      interval: 15m

  - name: vsan-health
    group: VCF - Deep Health
    token: "${TOK_VSAN}"
    heartbeat:
      interval: 15m

  - name: sddc-manager-health
    group: VCF - Deep Health
    token: "${TOK_SDDC}"
    heartbeat:
      interval: 15m

  # Functional read/write probe of the DS723+ NFS export (gatus-nfs CronJob).
  - name: nfs-share-readwrite
    group: Storage
    token: "${TOK_NFS}"
    heartbeat:
      interval: 15m
