apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gatus
  namespace: monitoring
spec:
  # Attach to the shared external Gateway in kube-system, consistent with
  # the cyberchef / argocd HTTPRoutes.
  parentRefs:
    - name: external-gateway
      namespace: kube-system
  hostnames:
    - status.lab.mxe11.nl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gatus-svc
          port: 80
