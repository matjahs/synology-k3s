apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gatus
  namespace: monitoring
spec:
  # Serve gatus over the external Gateway's per-host TLS listener
  # (https-status, terminates status-tls). sectionName pins it so it does NOT
  # also attach to the plain http listener.
  parentRefs:
    - name: external-gateway
      namespace: kube-system
      sectionName: https-status
  hostnames:
    - status.lab.mxe11.nl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gatus-svc
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gatus-redirect
  namespace: monitoring
spec:
  # Redirect plain http for status.lab.mxe11.nl to https. Pinned to the http
  # listener so it only affects this hostname (argocd/cyberchef http routes are
  # matched by their own hostnames and are untouched).
  parentRefs:
    - name: external-gateway
      namespace: kube-system
      sectionName: http
  hostnames:
    - status.lab.mxe11.nl
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
