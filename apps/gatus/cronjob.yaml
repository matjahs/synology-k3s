apiVersion: batch/v1
kind: CronJob
metadata:
  name: gatus-vcf
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus-vcf
spec:
  schedule: "*/5 * * * *"          # every 5 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: vcf-healthcheck
              # Alpine + curl + jq installed at start. Needs root for apk, so this
              # pod runs as root (caps still dropped). To run rootless instead,
              # bake a tiny curl+jq image and pin it here — see gatus.md.
              image: alpine:3.20
              command: ["/bin/sh", "-c"]
              args:
                - "apk add --no-cache curl jq >/dev/null && exec /bin/sh /scripts/vcf-healthcheck.sh"
              env:
                - name: GATUS_URL
                  value: "http://gatus-svc.monitoring.svc.cluster.local"
                - name: VC_HOST
                  value: "vcenter.vcf.lab"
                - name: SDDC_HOST
                  value: "sddc-manager.vcf.lab"
              # VC_USER/VC_PASS/SDDC_USER/SDDC_PASS + TOK_* come from the Secret
              envFrom:
                - secretRef:
                    name: gatus-secrets
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: scripts
              configMap:
                name: gatus-vcf-scripts
                defaultMode: 0755
