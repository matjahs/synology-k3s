# ---------------------------------------------------------------------------
# Example Secret for Gatus. COPY to a real secret (NOT committed) and apply,
# or manage via your sealed-secrets / SOPS flow. The Deployment and CronJob
# both mount it via envFrom.
#
#   cp secret.example.yaml gatus.secret   # ".secret" is gitignored; edit, then:
#   kubectl apply -n monitoring -f gatus.secret
#
# NSX_AUTH = base64 of "user:password"   ->   printf 'admin:PASS' | base64
# TOK_*    = arbitrary shared secrets; must match external-endpoints in config.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: gatus-secrets
  namespace: monitoring
type: Opaque
stringData:
  # --- NSX (native Basic-auth check) ---
  NSX_AUTH: "BASE64_OF_user:password"

  # --- vCenter (CronJob deep checks) ---
  VC_USER: "administrator@vsphere.local"
  VC_PASS: "CHANGE_ME"

  # --- SDDC Manager (CronJob deep check) ---
  SDDC_USER: "administrator@vsphere.local"
  SDDC_PASS: "CHANGE_ME"

  # --- Gatus push tokens (must match external-endpoints in config.yaml) ---
  TOK_VCENTER: "CHANGE_ME_random_string_1"
  TOK_VSAN: "CHANGE_ME_random_string_2"
  TOK_SDDC: "CHANGE_ME_random_string_3"
  TOK_NFS: "CHANGE_ME_random_string_4"
