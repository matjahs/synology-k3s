apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: tools
spec:
  # Attach to the shared external Gateway in kube-system, which allows routes
  # from all namespaces. external-dns publishes this hostname on the UniFi
  # gateway. Consistent with the cyberchef / argocd HTTPRoutes.
  parentRefs:
    - name: external-gateway
      namespace: kube-system
  hostnames:
    - home.lab.mxe11.nl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homepage-svc
          port: 80
