apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tools

resources:
  - serviceaccount.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml

# Homepage reads its config from /app/config. Rendering the YAML files as a
# ConfigMap keeps the dashboard fully declarative — edits go through git and
# Argo CD. The default name-suffix hash rolls the pod whenever config changes.
configMapGenerator:
  - name: homepage-config
    files:
      - config/settings.yaml
      - config/services.yaml
      - config/widgets.yaml
      - config/bookmarks.yaml
      - config/kubernetes.yaml
      - config/docker.yaml
