# ── settings.yaml ────────────────────────────────────────────────────────────
# Global look & feel for the VCF 9.1 lab portal.
# Docs: https://gethomepage.dev/configs/settings/
# ─────────────────────────────────────────────────────────────────────────────

title: VCF 9.1 Lab
description: VMware Cloud Foundation 9.1 Lab Environment

theme: dark
color: slate          # slate | zinc | gray | stone | sky | indigo | etc.
headerStyle: clean    # underlined | boxed | clean | boxedWidgets

# Opens all service links in a new tab
target: _blank

# Group layout — controls order and column count per section
layout:
  VCF Core:
    style: row
    columns: 4
  Network & Security:
    style: row
    columns: 3
  Management & Operations:
    style: row
    columns: 4
  Infrastructure:
    style: row
    columns: 4
