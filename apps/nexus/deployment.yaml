apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: tools
  labels:
    app.kubernetes.io/name: nexus
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate            # single RWO volume — don't run two pods at once
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      securityContext:
        fsGroup: 200
      containers:
        - name: nexus
          image: sonatype/nexus3:3.89.1
          ports:
            - name: http
              containerPort: 8081
          volumeMounts:
            - name: data
              mountPath: /nexus-data
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          securityContext:
            runAsUser: 200
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nexus-data
