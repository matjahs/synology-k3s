apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.3.0
    helm:
      values: |
        global:
          tolerations:
            - key: observability
              operator: Equal
              value: enabled
              effect: NoSchedule

        prometheusOperator:
          tolerations:
            - key: observability
              operator: Equal
              value: enabled
              effect: NoSchedule
          nodeSelector:
            observability: enabled

        prometheus:
          prometheusSpec:
            nodeSelector:
              observability: enabled
            tolerations:
              - key: observability
                operator: Equal
                value: enabled
                effect: NoSchedule
            scrapeInterval: 60s
            evaluationInterval: 60s
            retention: 7d
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1536Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: synology-iscsi
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi

        grafana:
          admin:
            existingSecret: grafana-admin
            passwordKey: admin-password
          nodeSelector:
            observability: enabled
          tolerations:
            - key: observability
              operator: Equal
              value: enabled
              effect: NoSchedule
          defaultDashboardsEnabled: false
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
          persistence:
            enabled: true
            storageClassName: synology-iscsi
            size: 5Gi

        alertmanager:
          enabled: false

        defaultRules:
          create: false

        kubeStateMetrics:
          nodeSelector:
            observability: enabled
          tolerations:
            - key: observability
              operator: Equal
              value: enabled
              effect: NoSchedule

        nodeExporter:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
