apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage-kubernetes
      imagePullSecrets:
        - name: nexus-docker-creds
      containers:
        - name: backstage
          image: nexus.lab.mxe11.nl/backstage/backstage:0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7007
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: AUTH_KEYCLOAK_CLIENT_ID
              value: "backstage"
            - name: KEYCLOAK_ISSUER_URL
              value: "https://keycloak.lab.mxe11.nl/realms/master/.well-known/openid-configuration"
            # Image 1.2.1 enables the vault plugin when NODE_ENV=production; keep development
            # until secret/backstage/vault exists and VAULT_STATIC_SECRET is synced by ESO.
            - name: NODE_ENV
              value: "development"
            # Override baked app-config vault URLs (HAProxy removed; Vault is on :8200).
            - name: APP_CONFIG_vault_baseUrl
              value: "https://vault.mxe11.nl:8200"
            - name: APP_CONFIG_vault_publicUrl
              value: "https://vault.mxe11.nl:8200"
            # Image 1.2.1 loads vcf-operations unconditionally; remove when image has credential gating.
            - name: VCFO_USERNAME
              value: "unused"
            - name: VCFO_PASSWORD
              value: "unused"
          envFrom:
            - secretRef:
                name: postgres-secrets
            - secretRef:
                name: backstage-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          startupProbe:
            httpGet:
              port: http
              path: /.backstage/health/v1/liveness
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              port: http
              path: /.backstage/health/v1/readiness
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              port: http
              path: /.backstage/health/v1/liveness
            periodSeconds: 10
            failureThreshold: 3
