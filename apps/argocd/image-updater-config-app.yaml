apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/matjahs/synology-k3s.git
    targetRevision: HEAD
    path: apps/argocd/image-updater
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
