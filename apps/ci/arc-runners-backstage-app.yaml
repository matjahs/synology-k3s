apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners-backstage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2
    helm:
      values: |
        githubConfigUrl: https://github.com/matjahs/backstage
        githubConfigSecret: arc-github-app
        runnerScaleSetName: k3s-backstage
        minRunners: 0
        maxRunners: 2
        controllerServiceAccount:
          namespace: ci
          name: arc-controller-gha-rs-controller
        template:
          spec:
            containers:
              - name: runner
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: ci
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
