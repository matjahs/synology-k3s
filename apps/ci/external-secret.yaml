apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app
  namespace: ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: arc-github-app
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        key: github/runners
        property: app_id
    - secretKey: github_app_installation_id
      remoteRef:
        key: github/runners
        property: installation_id
    - secretKey: github_app_private_key
      remoteRef:
        key: github/runners
        property: private_key
