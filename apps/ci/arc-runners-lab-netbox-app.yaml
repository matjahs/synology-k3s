apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners-lab-netbox
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: homelab
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2
    helm:
      values: |
        githubConfigUrl: https://github.com/matjahs/lab-netbox
        githubConfigSecret: arc-github-app
        runnerScaleSetName: k3s-lab-netbox
        minRunners: 0
        maxRunners: 2
        containerMode:
          type: dind
        controllerServiceAccount:
          namespace: ci
          name: arc-controller-gha-rs-controller
        template:
          spec:
            # Pod network cannot reach the Cilium L2 gateway IP (hairpin). Use the
            # node network so docker login/build can reach nexus.lab.mxe11.nl:443.
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: ci
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
