apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cyberchef
  namespace: tools
spec:
  # Attach to the shared external Gateway in kube-system, which allows routes
  # from all namespaces. Consistent with the argocd HTTPRoute.
  parentRefs:
    - name: external-gateway
      namespace: kube-system
  hostnames:
    - cyberchef.lab.mxe11.nl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: cyberchef-svc
          port: 80
