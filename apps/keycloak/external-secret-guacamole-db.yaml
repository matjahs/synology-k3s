apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: guacamole-db-creds
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: guacamole-db-creds
    creationPolicy: Owner
    template:
      data:
        username: "guacamole"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: guacamole/db
        property: password
