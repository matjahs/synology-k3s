apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1

  db:
    vendor: postgres
    # CloudNativePG read-write service for the keycloak-db Cluster.
    host: keycloak-db-rw
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-app
      key: username
    passwordSecret:
      name: keycloak-db-app
      key: password

  # TLS is terminated at the Cilium Gateway; Keycloak speaks plain HTTP behind
  # it and trusts X-Forwarded-* headers.
  http:
    httpEnabled: true
  proxy:
    headers: xforwarded

  hostname:
    hostname: https://keycloak.lab.mxe11.nl
    strict: false

  # Ingress is Cilium via the Gateway API (gateway.yaml uses
  # gatewayClassName: cilium; httproute.yaml routes to keycloak-service:8080).
  # Disable the operator's classic Ingress so it doesn't compete with that.
  ingress:
    enabled: false
