apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  annotations:
    # Reconciled after the Keycloak + CloudNativePG operators (wave -1). The CRs
    # here (Keycloak, postgresql.cnpg.io/Cluster) need those CRDs to exist.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: homelab
  # Plain Kustomize build of apps/keycloak (Gateway, HTTPRoutes, Certificate,
  # Issuer, CNPG Cluster, Keycloak CR). No Helm — the Bitnami chart was
  # retired in favour of the upstream Keycloak Operator.
  source:
    repoURL: https://github.com/matjahs/synology-k3s.git
    targetRevision: HEAD
    path: apps/keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      jqPathExpressions:
        - .spec.affinity
        - .spec.enablePDB
        - .spec.enableSuperuserAccess
        - .spec.failoverDelay
        - .spec.logLevel
        - .spec.maxSyncReplicas
        - .spec.minSyncReplicas
        - .spec.monitoring
        - .spec.postgresGID
        - .spec.postgresUID
        - .spec.postgresql
        - .spec.probes
        - .spec.replicationSlots
        - .spec.resources
        - .spec.smartShutdownTimeout
        - .spec.startDelay
        - .spec.stopDelay
        - .spec.switchoverDelay
        - .spec.managed.roles[].connectionLimit
        - .spec.managed.roles[].inherit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
