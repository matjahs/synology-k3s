apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: keycloak
spec:
  # Consumed by the Cilium Gateway https listener (gateway.yaml) to terminate
  # TLS for keycloak.lab.mxe11.nl. Issued by Let's Encrypt via DNS-01 against
  # the public mxe11.nl zone on Cloudflare (platform/letsencrypt-clusterissuer.yaml).
  secretName: keycloak-tls
  # LE caps certs at 90 days; let cert-manager use the CA-issued lifetime and
  # renew 30 days before expiry. (No explicit duration — the CA sets it.)
  renewBefore: 720h  # renew 30 days before expiry
  commonName: keycloak.lab.mxe11.nl
  dnsNames:
    - keycloak.lab.mxe11.nl
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
