apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-redirect
  namespace: keycloak
spec:
  parentRefs:
    - name: keycloak
      namespace: keycloak
      sectionName: http
  hostnames:
    - keycloak.lab.mxe11.nl
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  # Attaches to the TLS-terminating https listener and forwards plain HTTP to
  # the Service the operator creates for the Keycloak CR (<name>-service:8080).
  parentRefs:
    - name: keycloak
      namespace: keycloak
      sectionName: https
  hostnames:
    - keycloak.lab.mxe11.nl
  rules:
    - backendRefs:
        - name: keycloak-service
          port: 8080
