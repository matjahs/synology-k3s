apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: keycloak
spec:
  # Single instance: this is a single-node k3s cluster, so HA replicas would
  # only ever schedule on the same node. Bump once more nodes exist.
  instances: 1

  backup:
    barmanObjectStore:
      # endpoint_url and bucket must match Vault secret/cnpg/backup-s3.
      destinationPath: s3://cnpg-backups/keycloak-db/
      endpointURL: https://garage.lab.mxe11.nl:3900
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"

  storage:
    size: 8Gi
    # Cluster-default StorageClass is synology-iscsi; named explicitly so the
    # data volume's backend is unambiguous.
    storageClass: synology-iscsi

  managed:
    roles:
      - name: guacamole
        ensure: present
        login: true
        passwordSecret:
          name: guacamole-db-creds

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      # Owner role password comes from this out-of-band Secret (the same one
      # the Keycloak CR reads). type: kubernetes.io/basic-auth, keys
      # username/password. See keycloak-db-secret.example.yaml.
      secret:
        name: keycloak-db-app
