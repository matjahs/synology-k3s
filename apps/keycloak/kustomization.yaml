apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

# Only the raw supporting resources live here. The Keycloak Helm chart is
# inflated by the Argo CD Application (keycloak-app.yaml) as a native Helm
# source, so no kustomize helmCharts block (and no --enable-helm) is needed.
# The keycloak namespace is created via the Application's CreateNamespace=true.
resources:
  - certificate-issuer.yaml
  - certificate.yaml
  - gateway.yaml
  - httproute.yaml
