apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

# Keycloak now runs via the Keycloak Operator (CRDs installed by the platform
# keycloak-operator app) backed by a CloudNativePG Postgres Cluster. This
# Application is a plain Kustomize build of the resources below — no Helm.
# The keycloak namespace is created via the Application's CreateNamespace=true.
resources:
  - certificate-issuer.yaml
  - certificate.yaml
  - gateway.yaml
  - httproute.yaml
  - postgres-cluster.yaml
  - keycloak-cr.yaml
