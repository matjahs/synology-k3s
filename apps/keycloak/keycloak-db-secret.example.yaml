# EXAMPLE ONLY — DO NOT COMMIT REAL CREDENTIALS, DO NOT let Argo CD manage this.
#
# The root Argo CD app only discovers `*-app.yaml`, and this file is not listed
# in kustomization.yaml, so it is never synced from git. Fill in a password and
# apply it out-of-band, once, before the keycloak app syncs:
#
#   kubectl create namespace keycloak --dry-run=client -o yaml | kubectl apply -f -
#   cp keycloak-db-secret.example.yaml /tmp/kc-db.yaml
#   $EDITOR /tmp/kc-db.yaml            # set a strong password
#   kubectl apply -f /tmp/kc-db.yaml
#   shred -u /tmp/kc-db.yaml
#
# This single Secret is consumed by BOTH:
#   - CloudNativePG (postgres-cluster.yaml -> bootstrap.initdb.secret) to create
#     the `keycloak` role with this password, and
#   - the Keycloak CR (keycloak-cr.yaml -> db.usernameSecret/passwordSecret).
# It must be type kubernetes.io/basic-auth with keys `username` and `password`.
#
# The Keycloak ADMIN password is NOT here — the operator auto-generates it in
# the `keycloak-initial-admin` Secret. Retrieve it with:
#   kubectl get secret keycloak-initial-admin -n keycloak \
#     -o jsonpath='{.data.password}' | base64 -d
#
# When the Tier-1 SOPS + age work lands, replace this with a SOPS-encrypted
# Secret committed to git and delete this .example file.
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-app
  namespace: keycloak
type: kubernetes.io/basic-auth
stringData:
  username: keycloak
  password: REPLACE_ME
