# EXAMPLE ONLY — kept for reference. This Secret is now managed by ESO.
# See apps/keycloak/external-secret-db.yaml — ESO syncs it from
# Vault path secret/data/keycloak/db (keys: username, password).
# No manual kubectl apply needed.
#
# The Keycloak ADMIN password is NOT here — the operator auto-generates it in
# the `keycloak-initial-admin` Secret. Retrieve it with:
#   kubectl get secret keycloak-initial-admin -n keycloak \
#     -o jsonpath='{.data.password}' | base64 -d
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-app
  namespace: keycloak
type: kubernetes.io/basic-auth
stringData:
  username: keycloak
  password: REPLACE_ME
