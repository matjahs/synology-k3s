apiVersion: batch/v1
kind: Job
metadata:
  name: guacamole-db-init
  namespace: tools
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: guacamole-db-app
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              HOST=keycloak-db-rw.keycloak.svc.cluster.local
              # Gate on a schema-defining ENUM type, not just a table: a table can
              # exist from a partial/wrong load while the enum types the Guacamole
              # JDBC layer casts to ('USER'::guacamole_entity_type) are missing
              # — that exact gap silently shipped a broken schema on 2026-06-18.
              if [ "$(psql -h "$HOST" -U guacamole -d guacamole -tAc \
                      "SELECT 1 FROM pg_type WHERE typname='guacamole_entity_type'" 2>/dev/null)" = "1" ]; then
                echo "Schema already initialized (guacamole_entity_type present), skipping."
                exit 0
              fi
              echo "Initializing Guacamole schema..."
              psql -h "$HOST" -U guacamole -d guacamole -v ON_ERROR_STOP=1 -f /init/initdb.sql
              echo "Done."
          volumeMounts:
            - name: initdb
              mountPath: /init
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: initdb
          configMap:
            name: guacamole-initdb
