apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://helm.cilium.io/'
    chart: cilium
    targetRevision: 1.19.4
    helm:
      values: |
        kubeProxyReplacement: true
        k8sServiceHost: "172.16.30.8"
        k8sServicePort: 6443
        operator:
          replicas: 1
        ipam:
          operator:
            clusterPoolIPv4PodCIDRList:
              - "10.42.0.0/16"
        gatewayAPI:
          enabled: true
        l2announcements:
          enabled: true
        externalIPs:
          enabled: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
