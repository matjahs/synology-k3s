# Forward lab.mxe11.nl to UniFi local DNS so in-cluster pods (CI runners,
# apps pulling from Nexus, etc.) resolve the same hostnames as LAN clients.
# UniFi forwards lab.mxe11.nl queries; OctoDNS publishes records to UniFi at 172.16.0.1.
# cluster.local and the static NodeHosts entries in the stock k3s Corefile.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  lab.server: |
    lab.mxe11.nl:53 {
      forward . 172.16.0.1
      cache 30
    }
