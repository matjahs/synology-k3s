apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    # Needs to exist before any Certificate/Issuer is reconciled (e.g. Keycloak).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: homelab
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      values: |
        # cert-manager >= v1.15 uses crds.enabled (older charts used installCRDs).
        crds:
          enabled: true
        # Use public DNS for DNS-01 propagation checks so cert-manager bypasses
        # the internal Infoblox NS (172.16.30.110) which is unreachable from pods.
        extraArgs:
          - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
          - --dns01-recursive-nameservers-only=true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
