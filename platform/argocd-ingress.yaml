apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-gateway
  namespace: kube-system
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # Per-host TLS for status.lab.mxe11.nl. The cert is the `status-tls` Secret
    # issued by cert-manager into kube-system (this Gateway's namespace) from the
    # letsencrypt-prod ClusterIssuer — see external-gateway-certs.yaml. Argo CD
    #  stays HTTP for now (add their own https-<host> listeners when
    # they get certs). from: All so the gatus HTTPRoute in `monitoring` attaches.
    # - name: https-status
    #   protocol: HTTPS
    #   port: 443
    #   hostname: status.lab.mxe11.nl
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - kind: Secret
    #         name: status-tls
    #         namespace: kube-system
    #   allowedRoutes:
    #     namespaces:
    #       from: All
    - name: https-guacamole
      protocol: HTTPS
      port: 443
      hostname: guacamole.lab.mxe11.nl
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: guacamole-tls
            namespace: kube-system
      allowedRoutes:
        namespaces:
          from: All
    - name: https-nexus
      protocol: HTTPS
      port: 443
      hostname: nexus.lab.mxe11.nl
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: nexus-tls
            namespace: kube-system
      allowedRoutes:
        namespaces:
          from: All
    - name: https-backstage
      protocol: HTTPS
      port: 443
      hostname: backstage.lab.mxe11.nl
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: backstage-tls
            namespace: kube-system
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-dashboard
  namespace: argocd
spec:
  parentRefs:
    - name: external-gateway
      namespace: kube-system
  hostnames:
    - argocd.lab.mxe11.nl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
