apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    # Reconciles DNS from the Gateway API. Runs continuously, but ordering it
    # after the L2/Gateway networking (wave 0) means the Gateways already have
    # their LB IPs published in .status when it first syncs.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: homelab
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.21.1
    helm:
      # UniFi has no native external-dns provider, so we run the community
      # kashalls webhook as a sidecar (provider.name: webhook). external-dns
      # reads hostnames from HTTPRoutes and the target IP from each parent
      # Gateway's .status.addresses, then writes records to UniFi at 172.16.0.1.
      values: |
        sources:
          - gateway-httproute

        # Only manage our lab zone; never touch other UniFi records.
        domainFilters:
          - lab.mxe11.nl

        # Full lifecycle (create + delete). The TXT registry + txtOwnerId mean
        # external-dns only ever deletes records it created itself.
        policy: sync
        registry: txt
        txtOwnerId: lab-k3s
        txtPrefix: k8s.

        provider:
          name: webhook
          webhook:
            image:
              repository: ghcr.io/kashalls/external-dns-unifi-webhook
              tag: v0.8.2
            env:
              - name: UNIFI_HOST
                value: https://172.16.0.1
              # 172.16.0.1 is UniFi gateway hardware (UDM/UCG), not a
              # self-hosted controller, so this stays false.
              - name: UNIFI_EXTERNAL_CONTROLLER
                value: "false"
              # UniFi OS serves a self-signed cert on the API.
              - name: UNIFI_SKIP_TLS_VERIFY
                value: "true"
              # Local API key, applied out-of-band — see
              # external-dns-unifi-secret.example.yaml.
              - name: UNIFI_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: external-dns-unifi
                    key: api-key
              - name: LOG_LEVEL
                value: info
            livenessProbe:
              httpGet:
                path: /healthz
                port: http-webhook
              initialDelaySeconds: 10
              timeoutSeconds: 5
            readinessProbe:
              httpGet:
                path: /readyz
                port: http-webhook
              initialDelaySeconds: 10
              timeoutSeconds: 5
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
