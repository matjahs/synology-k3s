# EXAMPLE ONLY — DO NOT COMMIT REAL CREDENTIALS, DO NOT let Argo CD manage this.
#
# This file is a template. The root Argo CD app only discovers `*-app.yaml`,
# so this Secret is never synced from git. Fill in the placeholders and apply
# it out-of-band, once, before (or shortly after) democratic-csi syncs:
#
#   cp democratic-csi-secret.example.yaml /tmp/dcsi-secret.yaml
#   $EDITOR /tmp/dcsi-secret.yaml          # set host / credentials / volume
#   kubectl create namespace democratic-csi --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f /tmp/dcsi-secret.yaml
#   shred -u /tmp/dcsi-secret.yaml
#
# The chart mounts this Secret at /config and reads /config/driver-config-file.yaml,
# so the data key MUST be named exactly `driver-config-file.yaml`.
#
# DSM prerequisites (do once in DSM):
#   - Create a dedicated DSM user (e.g. `csi-user`) in the `administrators` group
#     (LUN/target management currently needs admin on DSM 7).
#   - Control Panel → File Services → enable iSCSI; note the volume (e.g. /volume1).
#   - If 2FA is enabled on that account, use a separate account without it.
#
# Node prerequisite (on the k3s VM host, once):
#   sudo apt-get install -y open-iscsi
#   sudo systemctl enable --now iscsid
#   sudo modprobe iscsi_tcp && echo iscsi_tcp | sudo tee /etc/modules-load.d/iscsi.conf
---
apiVersion: v1
kind: Secret
metadata:
  name: democratic-csi-driver-config
  namespace: democratic-csi
type: Opaque
stringData:
  driver-config-file.yaml: |
    driver: synology-iscsi
    httpConnection:
      protocol: http
      host: 172.16.30.X          # <-- DSM IP / hostname
      port: 5000                 # 5000 http / 5001 https
      username: csi-user         # <-- dedicated DSM admin user
      password: REPLACE_ME       # <-- that user's password
      allowInsecure: true
      # Identifies the DSM API session; any stable string is fine.
      session: "democratic-csi"
      serialize: true
    synology:
      # DSM volume that will host the LUNs.
      volume: /volume1           # <-- adjust to your DSM volume
    iscsi:
      targetPortal: "172.16.30.X"   # <-- same DSM IP (optionally host:port)
      targetPortals: []
      baseiqn: "iqn.2000-01.com.synology:csi."
      namePrefix: ""
      nameSuffix: ""
      lunTemplate:
        # BLUN = thin-provisioned (Btrfs); use BLUN_THICK for thick on Btrfs.
        type: "BLUN"
      lunSnapshotTemplate:
        is_locked: true
        is_app_consistent: true
      targetTemplate:
        auth_type: 0
        max_sessions: 0
