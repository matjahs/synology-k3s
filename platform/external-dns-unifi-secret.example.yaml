# EXAMPLE ONLY — DO NOT COMMIT A REAL API KEY, DO NOT let Argo CD manage this.
#
# The root Argo CD app only discovers `*-app.yaml`, so this Secret is never
# synced from git. Create the API key in UniFi, fill it in, and apply once:
#
#   kubectl create namespace external-dns --dry-run=client -o yaml | kubectl apply -f -
#   cp external-dns-unifi-secret.example.yaml /tmp/edns.yaml
#   $EDITOR /tmp/edns.yaml             # paste the API key
#   kubectl apply -f /tmp/edns.yaml
#   shred -u /tmp/edns.yaml
#
# Getting the API key (UniFi OS / Network 9.x):
#   UniFi → Settings → Control Plane → Integrations → Create API Key
#   (older builds: Settings → Admins → the admin → "Create API Key").
#   The webhook treats user/password auth as deprecated — use the API key.
#
# DNS prerequisite in UniFi:
#   Network must have the local DNS feature; external-dns writes A + TXT records
#   for the lab.mxe11.nl zone. Ensure clients resolve via the UniFi gateway
#   (172.16.0.1) for those names to take effect.
#
# When the Tier-1 SOPS + age work lands, replace this with a SOPS-encrypted
# Secret committed to git and delete this .example file.
---
apiVersion: v1
kind: Secret
metadata:
  name: external-dns-unifi
  namespace: external-dns
type: Opaque
stringData:
  api-key: REPLACE_ME
