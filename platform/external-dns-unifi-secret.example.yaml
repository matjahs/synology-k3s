# EXAMPLE ONLY — DO NOT COMMIT A REAL API KEY.
#
# Prefer Vault + External Secrets Operator (current path):
#
#   vault kv put secret/dns/unifi api_key=<unifi-integration-api-key>
#
# Or run: ./scripts/populate-dns-vault.sh
#
# ESO syncs to `dns/unifi-dns` (key `api-key`) for the OctoDNS CronJob.
#
# Getting the API key (UniFi OS / Network 9.x):
#   UniFi → Settings → Control Plane → Integrations → Create API Key
#
# Legacy manual Secret (external-dns, retired):
#
#   kubectl create namespace external-dns --dry-run=client -o yaml | kubectl apply -f -
#   cp external-dns-unifi-secret.example.yaml /tmp/edns.yaml
#   $EDITOR /tmp/edns.yaml
#   kubectl apply -f /tmp/edns.yaml
#   shred -u /tmp/edns.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: external-dns-unifi
  namespace: external-dns
type: Opaque
stringData:
  api-key: REPLACE_ME
