# EXAMPLE ONLY — DO NOT COMMIT A REAL TOKEN, DO NOT let Argo CD manage this.
#
# The root Argo CD app only discovers `*-app.yaml`, so this Secret is never
# synced from git. The cert-manager ClusterIssuers (letsencrypt-clusterissuer.yaml)
# read this token to solve DNS-01 challenges against the public mxe11.nl zone on
# Cloudflare. Create the token, fill it in, and apply once:
#
#   cp cert-manager-cloudflare-secret.example.yaml /tmp/cf.yaml
#   $EDITOR /tmp/cf.yaml              # paste the API token
#   kubectl apply -f /tmp/cf.yaml
#   shred -u /tmp/cf.yaml
#
# Creating the token (Cloudflare dashboard → My Profile → API Tokens →
# Create Token → "Edit zone DNS" template):
#   Permissions: Zone · DNS · Edit
#   Zone Resources: Include · Specific zone · mxe11.nl
#   (cert-manager also needs Zone · Zone · Read for zone lookup; the
#    "Edit zone DNS" template includes it.)
#
# When the Tier-1 SOPS + age work lands, replace this with a SOPS-encrypted
# Secret committed to git and delete this .example file.
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: REPLACE_ME
