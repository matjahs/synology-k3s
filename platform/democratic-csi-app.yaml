apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi
  namespace: argocd
  annotations:
    # Storage must be available before any stateful workload (e.g. Keycloak's
    # PostgreSQL PVC, wave 1) provisions a volume. Has no dependency on the
    # L2/Gateway networking (wave 0), only on a healthy node + CNI.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: homelab
  source:
    repoURL: https://democratic-csi.github.io/charts/
    chart: democratic-csi
    targetRevision: 0.15.1
    helm:
      # All values are inlined (matching cilium / cert-manager). The only
      # secret material — DSM host + credentials — is synced from Vault via ESO
      # (platform/external-secret-democratic-csi.yaml), NOT in this file.
      values: |
        csiDriver:
          name: org.democratic-csi.synology-iscsi

        # Cluster-wide default StorageClass. PVCs without an explicit
        # storageClassName (e.g. Bitnami PostgreSQL) land on Synology iSCSI.
        storageClasses:
          - name: synology-iscsi
            defaultClass: true
            reclaimPolicy: Delete
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
            parameters:
              fsType: ext4
            mountOptions: []

        # Requires external-snapshotter-app.yaml (sync-wave -2) for CRDs +
        # snapshot-controller before this chart syncs.
        volumeSnapshotClasses:
          - name: synology-iscsi
            defaultClass: true
            deletionPolicy: Delete
            parameters:
              fsType: ext4

        controller:
          enabled: true
          externalResizer:
            # Online PVC expansion (pairs with allowVolumeExpansion above).
            enabled: true
          externalSnapshotter:
            enabled: true

        node:
          enabled: true
          # Pi observability worker is tainted; CSI must run on every node that
          # mounts synology-iscsi PVCs (Grafana, Prometheus, etc.).
          tolerations:
            - key: observability
              operator: Equal
              value: enabled
              effect: NoSchedule
          driver:
            # democratic-csi ships busybox mount at /usr/local/bin/mount; bind
            # mounts need host util-linux (Pi bookworm has it at /usr/bin/mount).
            extraEnv:
              - name: USE_HOST_MOUNT_TOOLS
                value: "1"
              - name: ISCSIADM_HOST_STRATEGY
                value: chroot
              - name: ISCSIADM_HOST_PATH
                value: /usr/sbin/iscsiadm

        driver:
          # Credentials from ESO (democratic-csi-driver-config Secret); nothing
          # sensitive is committed.
          existingConfigSecret: democratic-csi-driver-config
          config:
            # Required even when existingConfigSecret is set — the chart reads
            # this value for templating decisions beyond Secret creation.
            driver: synology-iscsi
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
