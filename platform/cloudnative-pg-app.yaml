apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    # Postgres operator + CRDs must exist before any Cluster CR (Keycloak's
    # DB, wave 1) is reconciled. Needs storage (democratic-csi, wave -1) for
    # the data PVC, but the operator itself has no PVC.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.28.2
    helm:
      # Defaults are fine: cluster-wide operator in cnpg-system watching all
      # namespaces. CRDs ship with the chart.
      values: |
        crds:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CNPG CRDs are large; server-side apply avoids the kubectl
      # last-applied-configuration annotation size limit.
      - ServerSideApply=true
