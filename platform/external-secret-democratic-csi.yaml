apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: democratic-csi-driver-config
  namespace: democratic-csi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: democratic-csi-driver-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |
          driver: synology-iscsi
          httpConnection:
            protocol: http
            host: {{ .host }}
            port: {{ .port }}
            username: {{ .username }}
            password: {{ .password }}
            allowInsecure: true
            session: "democratic-csi"
            serialize: true
          synology:
            volume: {{ .volume }}
          iscsi:
            targetPortal: "{{ .target_portal }}"
            targetPortals: []
            baseiqn: "iqn.2000-01.com.synology:csi."
            namePrefix: ""
            nameSuffix: ""
            lunTemplate:
              type: "BLUN"
            lunSnapshotTemplate:
              is_locked: true
              is_app_consistent: true
            targetTemplate:
              auth_type: 0
              max_sessions: 0
  data:
    - secretKey: host
      remoteRef:
        key: democratic-csi/driver
        property: host
    - secretKey: port
      remoteRef:
        key: democratic-csi/driver
        property: port
    - secretKey: username
      remoteRef:
        key: democratic-csi/driver
        property: username
    - secretKey: password
      remoteRef:
        key: democratic-csi/driver
        property: password
    - secretKey: volume
      remoteRef:
        key: democratic-csi/driver
        property: volume
    - secretKey: target_portal
      remoteRef:
        key: democratic-csi/driver
        property: target_portal
