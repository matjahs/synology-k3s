apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Raw platform resources deployed by platform-app.yaml via Kustomize.
# The *-app.yaml Applications in this directory (cilium, cert-manager,
# platform) are discovered directly by the root app and are intentionally
# NOT listed here.
resources:
  - argocd-ingress.yaml
  - l2-networking.yaml
  - letsencrypt-clusterissuer.yaml
  - external-gateway-certs.yaml
  - vault-secret-store.yaml
