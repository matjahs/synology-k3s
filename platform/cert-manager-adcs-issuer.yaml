---
apiVersion: v1
kind: Secret
metadata:
  name: corp-ca01-credentials
  namespace: cert-manager
type: Opaque
stringData:
  username: "corp\\svc-certmanager"
  password: VMware123!VMware123!
---
apiVersion: adcs.certmanager.csf.nokia.com/v1
kind: ClusterAdcsIssuer
metadata:
  name: corp-ca01
spec:
  caBundle: "-----BEGIN CERTIFICATE----------END CERTIFICATE-----"
  credentialsRef:
    name: corp-ca01-credentials
    namespace: cert-manager
  url: https://CORP-CA01.corp.mxe11.nl/certsrv
  templateName: VCF Web Server
  retryInterval: 1m
  statusCheckInterval: 6h
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: keycloak
spec:
  secretName: keycloak-tls
  issuerRef:
    name: corp-ca01
    kind: ClusterAdcsIssuer
    group: adcs.certmanager.csf.nokia.com
  commonName: keycloak.lab.mxe11.nl
  dnsNames:
  - keycloak.lab.mxe11.nl
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 2048
