apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns-netbox-sync
  namespace: dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dns-netbox-sync
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "gateways"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dns-netbox-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dns-netbox-sync
subjects:
  - kind: ServiceAccount
    name: dns-netbox-sync
    namespace: dns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-netbox-sync
  namespace: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns-netbox-sync
  template:
    metadata:
      labels:
        app: dns-netbox-sync
    spec:
      serviceAccountName: dns-netbox-sync
      containers:
        - name: sync
          image: nexus.lab.mxe11.nl/platform/dns-netbox-sync:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NETBOX_URL
              value: https://netbox.lab.mxe11.nl
            - name: DNS_DOMAIN
              value: lab.mxe11.nl
            - name: SYNC_INTERVAL
              value: "60"
            - name: LOG_LEVEL
              value: info
            - name: NETBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: netbox-api
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
