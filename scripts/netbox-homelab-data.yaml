# Homelab inventory for scripts/seed-netbox-homelab.py
#
# Partially auto-derived from scripts/discover-homelab.sh (ESXi @ 172.16.30.11).
# Re-run discovery after infra changes:
#   export VCF_SSH_PASS='…'
#   ./scripts/discover-homelab.sh esxi
#
# Usage:
#   export NETBOX_TOKEN=$(vault kv get -field=token secret/netbox/api)
#   ./scripts/seed-netbox-homelab.sh

site:
  name: Homelab
  slug: lab
  status: active
  description: MxE-Labs lab environment
  physical_address: |
    Waalbandijk 469
    6541AA Nijmegen
    The Netherlands

tags:
  - lab
  - gitops

rir:
  name: RFC1918
  slug: rfc1918
  is_private: true

aggregates:
  - prefix: 172.16.0.0/12
    rir: rfc1918
    description: Homelab private supernet

vlan_groups:
  - name: Physical Edge
    slug: physical-edge
    description: UCG and MikroTik VLANs on the physical LAN
  - name: VCF Nested
    slug: vcf-nested
    description: Virtual VCF/Holodeck — reachable only via holorouter 172.16.30.12

vrfs:
  - name: VCF Nested
    slug: vcf-nested
    description: Virtual VCF/Holodeck address space — UCG routes 10.1.0.0/20 via holorouter 172.16.30.12

asns:
  - asn: 65000
    description: HoloRouter (local ASN)
    device: holorouter.lab.mxe11.nl
  - asn: 65001
    description: Management edge (BGP peer on holorouter)
    device: holorouter.lab.mxe11.nl
  - asn: 65002
    description: Workload edge (BGP peer on holorouter)
    device: holorouter.lab.mxe11.nl

ip_ranges:
  - start: 172.16.30.240
    end: 172.16.30.247
    description: Cilium L2 LB VIP pool (external-gateway)

# VLAN IDs: UCG (ssh root@172.16.0.1), MikroTik bridge1 (ssh admin@172.16.0.2), ESXi portgroups.
# Physical VLAN 10 (172.16.10.0/24) is NOT the same as nested VCF mgmt (10.1.1.0/24 in VRF vcf-nested).
vlans:
  - vid: 1
    slug: vlan1-lan
    name: lan
    vlan_group: physical-edge
    description: Untagged on MikroTik bridge1; UCG br0 172.16.0.1/24 (switch0.1)
    status: active
  - vid: 10
    slug: vlan10
    name: vlan10
    vlan_group: physical-edge
    description: Physical UCG br10 172.16.10.1/24 (switch0.10) — not trunked on MikroTik bridge1
    status: active
  - vid: 20
    slug: vlan20
    name: vlan20
    vlan_group: physical-edge
    description: UCG br20 172.16.13.1/24 (switch0.20) — subnet .13.x, not on MikroTik
    status: active
  - vid: 30
    slug: vlan30-servers
    name: servers
    vlan_group: physical-edge
    description: UCG br30 172.16.30.1/24 (switch0.30); tagged on MikroTik bridge1
    status: active
  - vid: 50
    slug: vlan50-storage
    name: storage
    vlan_group: physical-edge
    description: UCG switch0.50 + MikroTik STORAGE trunk (SFP+, ether7); 172.16.50.0/24
    status: active
  - vid: 100
    slug: vlan100-vcf
    name: vcf
    vlan_group: physical-edge
    description: UCG switch0.100 trunk; MikroTik vlan100-ingress 192.168.100.1/24
    status: active
  - vid: 200
    slug: vlan200
    name: vlan200
    vlan_group: physical-edge
    description: MikroTik bridge1 only (ether8, SFP+) — trunk-only, no L3 prefix
    status: active
  - vid: 300
    slug: vlan300-wan
    name: wan
    vlan_group: physical-edge
    description: UCG WAN — eth4.300 95.99.12.24/22 (ISP)
    status: active
  - vid: 24
    slug: vlan24-holodeck
    name: holodeck-dtgw
    vlan_group: vcf-nested
    description: Holodeck DTGW — logical VLAN inside nested VCF (10.1.8.128/25)
    status: active

prefixes:
  - prefix: 172.16.0.0/24
    vlan: vlan1-lan
    status: active
    description: Main LAN — UCG br0, MikroTik core, Pi
  - prefix: 172.16.10.0/24
    vlan: vlan10
    status: active
    description: Physical VLAN 10 — UCG gateway 172.16.10.1
  - prefix: 172.16.13.0/24
    vlan: vlan20
    status: active
    description: VLAN 20 — UCG gateway 172.16.13.1 (br20)
  - prefix: 172.16.30.0/24
    vlan: vlan30-servers
    status: active
    description: Servers / VMs — UCG gateway 172.16.30.1 (br30)
  - prefix: 172.16.30.240/29
    vlan: vlan30-servers
    status: active
    description: Cilium L2 load-balancer VIP pool (external-gateway)
  - prefix: 172.16.31.0/24
    vlan: vlan30-servers
    status: active
    description: WireGuard — UCG wgsrv1 172.16.31.1
  - prefix: 172.16.50.0/24
    vlan: vlan50-storage
    status: active
    description: Storage VLAN — Synology .100, ESXi vmk2 .99
  - prefix: 192.168.100.0/24
    vlan: vlan100-vcf
    status: active
    description: VCF ingress — MikroTik vlan100-ingress gateway 192.168.100.1
  - prefix: 95.99.12.0/22
    vlan: vlan300-wan
    status: active
    description: UCG WAN public block — eth4.300 (dynamic 95.99.12.24)
  # VCF nested — VRF vcf-nested (no physical VLAN on edge)
  - prefix: 10.1.0.0/20
    vrf: vcf-nested
    status: active
    description: VCF site-a supernet — UCG static route via holorouter 172.16.30.12
  - prefix: 10.1.1.0/24
    vrf: vcf-nested
    status: active
    description: Nested VCF management plane (site-a) — logical VLAN 10 inside VCF, not physical UCG VLAN 10
  - prefix: 10.1.0.0/24
    vrf: vcf-nested
    status: active
    description: Holodeck VPC-External-Block-a — gateway 10.1.0.1
  - prefix: 10.1.8.128/25
    vrf: vcf-nested
    vlan: vlan24-holodeck
    status: active
    description: Holodeck DTGW configuration — gateway 10.1.8.129

# UCG switch0 VLANs: 1, 10, 20, 30, 50, 100. MikroTik-only VLAN 200. Disabled on MikroTik: 40, 60, 70, 80-81, 99, 199

